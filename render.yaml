services:
  - type: web
    name: dataviz-backend
    env: python
    region: ohio
    plan: starter
    buildCommand: |
      pip install -r backend_django/requirements.txt
      cd backend_django
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend_django
      gunicorn dataviz_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: dataviz-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false # Set to Vercel URL in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set to Vercel URL in Render dashboard
      - key: CSRF_TRUSTED_ORIGINS
        sync: false # Set to Vercel URL in Render dashboard
    disk:
      name: media-disk
      mountPath: /app/backend_django/media
      sizeGB: 1

databases:
  - name: dataviz-db
    databaseName: dataviz
    user: dataviz
    plan: free
