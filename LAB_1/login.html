<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <header class="login-header">
                <h1 class="login-title">Data Analyzer Pro</h1>
                <p class="login-subtitle">Sign in to access your data analysis tools</p>
            </header>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" aria-label="Login form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    Sign In
                </button>

                <div class="error-message" id="errorMessage" style="display: none;"></div>
            </form>

            <!-- Demo Credentials Info -->
            <aside class="demo-info">
                <h3>Demo Credentials</h3>
                <p><strong>Username:</strong> demo</p>
                <p><strong>Password:</strong> demo123</p>
            </aside>

            <!-- Register Link -->
            <footer class="login-footer">
                <p>Don't have an account? <a href="#" class="register-link">Create one</a></p>
            </footer>
        </div>

        <!-- Theme Toggle -->
        <button id="themeToggle" class="theme-toggle theme-toggle-login" aria-label="Toggle theme">
            <span class="theme-icon">🌙</span>
        </button>
    </div>

    <script src="login.js"></script>
</body>

</html>
